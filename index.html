<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minha Saúde">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="/minha-saude/manifest.json">
<link rel="apple-touch-icon" href="/minha-saude/icons/icon-192.png">
<title>Minha Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#181c26;--bg3:#1e2333;--bg4:#252a3a;--bg5:#2d3347;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.2);
  --text:#f0f2f8;--text2:#8b92a8;--text3:#555d75;
  --accent:#4f7fff;--accent2:#2dd4a0;--amber:#f5a623;--red:#ff5c5c;--purple:#a78bfa;
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;}
.app{display:flex;flex-direction:column;height:100dvh;}

/* HEADER */
.hdr{padding:52px 20px 14px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end;}
.hdr-greet{font-size:12px;color:var(--text3);margin-bottom:2px;}
.hdr-title{font-size:21px;font-weight:600;letter-spacing:-0.3px;}
.hdr-date{font-size:11px;color:var(--text3);font-family:var(--mono);}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 20px);}
.screen{display:none;padding:16px;animation:fadeIn 0.15s ease;}
.screen.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* NAV */
.nav{height:var(--nav-h);padding-bottom:var(--safe-b);background:var(--bg2);border-top:0.5px solid var(--border);display:flex;flex-shrink:0;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-family:var(--font);cursor:pointer;transition:color 0.15s;padding-top:2px;}
.nb.on{color:var(--accent);}
.nb svg{width:21px;height:21px;stroke-width:1.7;}

/* UTILS */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:10px;}
.stit{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 8px;}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;}
.tag-blue{background:rgba(79,127,255,0.15);color:#7da8ff;}
.tag-green{background:rgba(45,212,160,0.12);color:#2dd4a0;}
.tag-amber{background:rgba(245,166,35,0.12);color:#f5a623;}
.tag-purple{background:rgba(167,139,250,0.12);color:#a78bfa;}
.tag-red{background:rgba(255,92,92,0.12);color:#ff5c5c;}
.empty{font-size:13px;color:var(--text3);text-align:center;padding:32px 0;}
.btn-primary{width:100%;padding:13px;background:var(--accent2);color:#0a1a14;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);}
.btn-ghost{width:100%;padding:11px;background:rgba(79,127,255,0.08);border:0.5px solid rgba(79,127,255,0.25);border-radius:var(--radius-sm);font-size:13px;color:var(--accent);cursor:pointer;font-family:var(--font);font-weight:500;}

/* ── TREINO SELECTOR / LINHA DO TEMPO ── */
.sel-wrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:12px;}
.sel-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
.timeline-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;}
.timeline-date{font-size:13px;font-weight:600;color:var(--text);}
.timeline-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;}
.timeline-scroll::-webkit-scrollbar{display:none;}
.tl-day{min-width:58px;padding:8px 6px;border-radius:12px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:500;font-family:var(--font);cursor:pointer;text-align:center;line-height:1.2;transition:all 0.15s;scroll-snap-align:center;}
.tl-day.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.tl-day .wk{display:block;font-size:10px;opacity:0.78;text-transform:uppercase;}
.tl-day .dm{display:block;font-size:15px;font-weight:600;margin:2px 0;}
.tl-day .mo{display:block;font-size:10px;opacity:0.78;text-transform:uppercase;}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sel-btn{padding:10px 6px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;text-align:center;line-height:1.3;transition:all 0.15s;}
.sel-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.sel-btn small{display:block;font-size:10px;font-weight:400;opacity:0.75;margin-top:2px;}

/* ── EXERCISE CARDS ── */
.ecard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.ecard.done .ecard-top{opacity:0.45;}
.ecard-top{display:flex;gap:11px;align-items:flex-start;padding:13px;cursor:pointer;}
.eicon{width:38px;height:38px;border-radius:9px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.einfo{flex:1;min-width:0;}
.ename{font-size:14px;font-weight:500;margin-bottom:2px;}
.emeta{font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:5px;}
.etags{display:flex;flex-wrap:wrap;gap:3px;}
.saved-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.chip{background:rgba(45,212,160,0.12);color:var(--accent2);border-radius:5px;padding:2px 7px;font-size:11px;font-family:var(--mono);}
.echk{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.15s;background:none;}
.echk.done{background:var(--accent2);border-color:var(--accent2);}
.echk svg{width:12px;height:12px;stroke:#fff;display:none;}
.echk.done svg{display:block;}

/* ── LOG PANEL ── */
.log-panel{display:none;border-top:0.5px solid var(--border);padding:12px 13px;background:var(--bg3);}
.log-panel.open{display:block;}
.log-panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.log-panel-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}
.last-perf{font-size:11px;color:var(--text3);font-family:var(--mono);}
.series-tbl{width:100%;border-collapse:collapse;margin-bottom:8px;}
.series-tbl th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:0 4px 6px;text-align:center;font-weight:500;}
.series-tbl th:first-child{text-align:left;padding-left:0;}
.series-tbl td{padding:4px;}
.sinp{width:100%;padding:7px 8px;border:0.5px solid var(--border2);border-radius:var(--radius-xs);font-size:13px;background:var(--bg4);color:var(--text);font-family:var(--mono);outline:none;text-align:center;}
.sinp:focus{border-color:var(--accent);}
.sinp::placeholder{color:var(--text3);font-size:11px;}
.slbl{font-size:11px;color:var(--text3);font-family:var(--mono);padding:4px 0;text-align:center;}
.del-serie{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;}
.panel-actions{display:flex;gap:6px;margin-top:8px;}
.btn-add-serie{flex:1;padding:8px;background:none;border:0.5px dashed var(--border2);border-radius:var(--radius-xs);color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--font);}
.btn-save-serie{flex:2;padding:8px;background:var(--accent2);color:#0a1a14;border:none;border-radius:var(--radius-xs);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);}
.obs-inp{width:100%;margin-top:8px;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;background:var(--bg4);color:var(--text);font-family:var(--font);outline:none;}

/* ── PBAR ── */
.pbar-w{height:3px;background:var(--bg4);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.pbar-f{height:100%;border-radius:2px;background:var(--accent2);transition:width 0.4s;}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;font-family:var(--mono);}

/* ── TREINO HEADER ── */
.t-hdr{margin-bottom:12px;}
.t-label{font-size:15px;font-weight:600;margin-bottom:2px;}
.t-obj{font-size:12px;color:var(--text2);}

/* ── REST CARD ── */
.rest-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:36px 20px;text-align:center;}

/* ── HISTÓRICO TREINOS ── */
.htabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none;}
.htabs::-webkit-scrollbar{display:none;}
.htab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;}
.htab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.hsession{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.hsession-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--border);}
.hsession-name{font-size:14px;font-weight:600;}
.hsession-date{font-size:11px;color:var(--text3);font-family:var(--mono);}
.hex{padding:8px 0;border-bottom:0.5px solid var(--border);}
.hex:last-child{border-bottom:none;}
.hex-name{font-size:13px;font-weight:500;margin-bottom:5px;}
.hex-chips{display:flex;flex-wrap:wrap;gap:4px;}
.hex-chip{background:var(--bg4);border-radius:5px;padding:3px 8px;font-size:11px;font-family:var(--mono);color:var(--text2);}
.hex-obs{font-size:11px;color:var(--text3);margin-top:4px;font-style:italic;}

/* ── PROGRESSÃO ── */
.prog-ex-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:8px;}
.prog-ex-name{font-size:13px;font-weight:600;margin-bottom:8px;}
.prog-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.prog-row:last-child{border-bottom:none;}
.prog-date{color:var(--text3);font-family:var(--mono);}
.prog-val{color:var(--text2);font-family:var(--mono);}
.prog-best{color:var(--accent2);font-family:var(--mono);font-weight:500;}

/* ── ALIMENTAÇÃO ── */
.cal-ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
.cal-ring{position:relative;width:90px;height:90px;flex-shrink:0;}
.cal-ring svg{transform:rotate(-90deg);}
.cal-ring-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.cal-ring-val{font-size:20px;font-weight:600;font-family:var(--mono);line-height:1;}
.cal-ring-lbl{font-size:10px;color:var(--text3);margin-top:1px;}
.macro-bars{flex:1;}
.macro-bar-row{margin-bottom:6px;}
.macro-bar-info{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.macro-bar-lbl{color:var(--text2);}
.macro-bar-val{color:var(--text3);font-family:var(--mono);}
.macro-bar-bg{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.macro-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}

.meal-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.meal-section-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;}
.meal-section-name{font-size:14px;font-weight:500;}
.meal-section-meta{display:flex;align-items:center;gap:8px;}
.meal-kcal{font-size:12px;color:var(--text3);font-family:var(--mono);}
.meal-add-btn{width:24px;height:24px;border-radius:50%;background:rgba(79,127,255,0.15);border:none;color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
.meal-items{padding:0 14px 10px;display:none;}
.meal-items.open{display:block;}
.food-item-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:0.5px solid var(--border);}
.food-item-name{font-size:13px;flex:1;}
.food-item-qty{font-size:12px;color:var(--text3);font-family:var(--mono);margin-right:8px;}
.food-item-kcal{font-size:12px;color:var(--amber);font-family:var(--mono);margin-right:8px;}
.food-del-btn{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:2px 4px;}

/* MODAL / DRAWER */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-b));width:100%;max-height:85dvh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:600;}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1;}
.search-inp{width:100%;padding:11px 14px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;margin-bottom:12px;}
.search-inp:focus{border-color:var(--accent);}
.food-result{padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.food-result:last-child{border-bottom:none;}
.food-result-name{font-size:13px;font-weight:500;}
.food-result-info{font-size:11px;color:var(--text3);margin-top:2px;}
.food-result-kcal{font-size:12px;color:var(--amber);font-family:var(--mono);}
.qty-row{display:flex;gap:8px;align-items:center;margin-top:12px;}
.qty-inp{flex:1;padding:10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:16px;background:var(--bg3);color:var(--text);font-family:var(--mono);outline:none;text-align:center;}
.qty-unit{font-size:13px;color:var(--text2);}
.add-food-btn{padding:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);}
.selected-food-name{font-size:14px;font-weight:500;margin-bottom:4px;}
.selected-food-info{font-size:12px;color:var(--text3);margin-bottom:12px;}

/* HIST VIEW TOGGLE */
.view-tabs{display:flex;gap:6px;margin-bottom:14px;}
.view-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;}
.view-tab.on{background:var(--bg4);color:var(--text);border-color:var(--border3);}

/* FINALIZE BTN */
.finalize-btn{width:100%;margin-top:10px;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-row">
      <div><div class="hdr-greet" id="greet">Bem-vindo</div><div class="hdr-title">Minha Saúde 💪</div></div>
      <div class="hdr-date" id="hdr-date"></div>
    </div>
  </div>

  <div class="content">

    <!-- ══ TREINO ══ -->
    <div class="screen on" id="sc-treino">
      <div class="sel-wrap">
        <div class="sel-lbl">Linha do tempo do treino</div>
        <div class="timeline-head">
          <div class="timeline-date" id="timeline-date-label">Selecione um dia</div>
        </div>
        <div class="timeline-scroll" id="timeline-scroll"></div>
        <div class="sel-lbl" style="margin-top:12px;">Tipo de treino do dia</div>
        <div class="sel-grid" id="sel-grid"></div>
      </div>
      <div id="exlist"></div>
    </div>

    <!-- ══ HISTÓRICO ══ -->
    <div class="screen" id="sc-hist">
      <div class="view-tabs">
        <button class="view-tab on" onclick="showHistView('sessions',this)">Sessões</button>
        <button class="view-tab" onclick="showHistView('progress',this)">Progressão</button>
      </div>

      <div id="hist-sessions">
        <div class="htabs" id="htabs"></div>
        <div id="session-list"><p class="empty">Nenhum treino registrado ainda.</p></div>
      </div>

      <div id="hist-progress" style="display:none;">
        <div class="stit">Evolução por exercício</div>
        <div id="prog-list"><p class="empty">Treine para ver sua progressão aqui.</p></div>
      </div>
    </div>

    <!-- ══ ALIMENTAÇÃO ══ -->
    <div class="screen" id="sc-food">
      <div class="card">
        <div class="cal-ring-wrap">
          <div class="cal-ring">
            <svg width="90" height="90" viewBox="0 0 90 90">
              <circle cx="45" cy="45" r="38" fill="none" stroke="#252a3a" stroke-width="8"/>
              <circle cx="45" cy="45" r="38" fill="none" stroke="#f5a623" stroke-width="8"
                stroke-dasharray="239" id="cal-arc" stroke-dashoffset="239" stroke-linecap="round"/>
            </svg>
            <div class="cal-ring-num">
              <div class="cal-ring-val" id="cal-consumed">0</div>
              <div class="cal-ring-lbl">kcal</div>
            </div>
          </div>
          <div class="macro-bars">
            <div class="macro-bar-row">
              <div class="macro-bar-info"><span class="macro-bar-lbl">Proteína</span><span class="macro-bar-val" id="prot-val">0/160g</span></div>
              <div class="macro-bar-bg"><div class="macro-bar-fill" id="prot-bar" style="width:0%;background:#7da8ff;"></div></div>
            </div>
            <div class="macro-bar-row">
              <div class="macro-bar-info"><span class="macro-bar-lbl">Carboidrato</span><span class="macro-bar-val" id="carb-val">0/350g</span></div>
              <div class="macro-bar-bg"><div class="macro-bar-fill" id="carb-bar" style="width:0%;background:#f5a623;"></div></div>
            </div>
            <div class="macro-bar-row">
              <div class="macro-bar-info"><span class="macro-bar-lbl">Gordura</span><span class="macro-bar-val" id="fat-val">0/80g</span></div>
              <div class="macro-bar-bg"><div class="macro-bar-fill" id="fat-bar" style="width:0%;background:#2dd4a0;"></div></div>
            </div>
          </div>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--text3);">Meta: <span style="color:var(--amber);font-family:var(--mono);">2850 kcal</span> · <span id="cal-remaining" style="font-family:var(--mono);">2850 restantes</span></div>
      </div>

      <div id="meal-sections"></div>
    </div>

  </div>

  <nav class="nav">
    <button class="nb on" onclick="showScreen('treino',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16"/><circle cx="4" cy="12" r="2"/><circle cx="20" cy="12" r="2"/></svg>
      Treino
    </button>
    <button class="nb" onclick="showScreen('hist',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="13" y2="18"/></svg>
      Histórico
    </button>

const MONTH_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function dateKeyFromDate(date){
  const day=String(date.getDate()).padStart(2,'0');
  const month=String(date.getMonth()+1).padStart(2,'0');
  const year=date.getFullYear();
  return `${day}-${month}-${year}`;
}
function parseDateKey(key){
  const [d,m,y]=key.split('-').map(Number);
  return new Date(y,m-1,d);
}
function isDateInTimeline(date){
  return date >= TIMELINE_START && date <= TIMELINE_END;
}
function buildTimelineDates(){
  const out=[];
  const cur=new Date(TIMELINE_START);
  while(cur<=TIMELINE_END){
    out.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  return out;
}
const TIMELINE_DATES = buildTimelineDates();
const realToday = new Date();
const DEFAULT_DATE_KEY = dateKeyFromDate(isDateInTimeline(realToday) ? realToday : TIMELINE_START);

let activeTreino = 'UPPER_A';

}

    </button>`;
  }).join('');

function getLastPerf(exName){
  for(const s of workoutHistory){
    const ex=s.exercicios?.find(e=>e.name===exName);
    if(ex?.series?.length){
      const best=ex.series.reduce((b,s)=>parseFloat(s.peso||0)>parseFloat(b.peso||0)?s:b,ex.series[0]);
      return best.peso?`Último: ${best.peso}kg × ${best.reps||'?'}`:null;
    }
  }
  return null;
}

function renderExs(){
  const el=document.getElementById('exlist');
  const t=TREINOS[activeTreino];
  if(!t.exs.length){
    el.innerHTML=`<div class="rest-card"><div style="font-size:40px;margin-bottom:12px;">${t.icon}</div><div style="font-size:16px;font-weight:600;margin-bottom:6px;">${t.label}</div><div style="font-size:13px;color:var(--text2);">${t.obj}</div></div>`;
    return;
  }
  const done=t.exs.filter((_,i)=>exChecked[activeTreino+'_'+i]).length;
  const pct=t.exs.length?Math.round(done/t.exs.length*100):0;

  let html=`<div class="t-hdr"><div class="t-label">${t.label} — ${t.sub}</div><div class="t-obj">${t.obj}</div></div>
    <div class="prog-info"><span>${done} de ${t.exs.length} concluídos</span><span>${pct}%</span></div>
    <div class="pbar-w"><div class="pbar-f" style="width:${pct}%"></div></div>`;

  t.exs.forEach((e,i)=>{
    const k=activeTreino+'_'+i;
    const isDone=!!exChecked[k];
    const series=exSeries[k]||[];
    const isOpen=openPanel===k;
    const lastPerf=getLastPerf(e.name);
    const chips=series.filter(s=>s.reps||s.peso).map((s,si)=>`<span class="chip">S${si+1}: ${s.peso?s.peso+'kg':'—'}×${s.reps||'—'}</span>`).join('');

    html+=`<div class="ecard${isDone?' done':''}">
      <div class="ecard-top" onclick="togglePanel('${k}',${e.defaultSeries||3})">
        <div class="eicon">${e.icon}</div>
        <div class="einfo">
          <div class="ename">${e.name}</div>
          <div class="emeta">${e.meta} · descanso ${e.rest}</div>
          <div class="etags">${(e.tags||[]).map(t=>`<span class="tag ${tagColors[t]||'tag-blue'}">${t}</span>`).join('')}</div>
          ${chips?`<div class="saved-chips">${chips}</div>`:''}
        </div>
        <button class="echk${isDone?' done':''}" onclick="event.stopPropagation();toggleEx('${k}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
      <div class="log-panel${isOpen?' open':''}" id="panel-${k}">
        <div class="log-panel-hdr">
          <span class="log-panel-title">Séries realizadas</span>
          ${lastPerf?`<span class="last-perf">${lastPerf}</span>`:''}
        </div>
        <table class="series-tbl">
          <tr><th>Série</th><th>Peso (kg)</th><th>Reps</th><th></th></tr>
          <tbody id="tbody-${k}"></tbody>
        </table>
        <div class="panel-actions">
          <button class="btn-add-serie" onclick="addSerie('${k}')">+ série</button>
          <button class="btn-save-serie" onclick="saveSeries('${k}')">✓ Salvar</button>
        </div>
        <input class="obs-inp" type="text" placeholder="Observação (opcional)..." id="obs-${k}" value="${series[0]?.obs||''}">
      </div>
    </div>`;
  });

  html+=`<button class="finalize-btn" onclick="finalizarTreino()">✓ Finalizar e salvar treino</button>`;
  el.innerHTML=html;

  if(openPanel) renderTbody(openPanel);
}

function renderTbody(k){
  const tbody=document.getElementById('tbody-'+k);
  if(!tbody) return;
  const series=exSeries[k]||[];
  tbody.innerHTML=series.map((s,i)=>`
    <tr>
      <td class="slbl">S${i+1}</td>
      <td><input class="sinp" type="number" placeholder="kg" value="${s.peso||''}" id="p-${k}-${i}" step="0.5"></td>
      <td><input class="sinp" type="number" placeholder="reps" value="${s.reps||''}" id="r-${k}-${i}"></td>
      <td><button class="del-serie" onclick="delSerie('${k}',${i})">×</button></td>
    </tr>`).join('');
}

function togglePanel(k,defaultN){
  if(openPanel===k){openPanel=null;}
  else{
    openPanel=k;
    if(!exSeries[k]||!exSeries[k].length){
      exSeries[k]=Array.from({length:defaultN},()=>({peso:'',reps:'',obs:''}));
      sv('exSeries_'+selectedDateKey,exSeries);
    }
  }
  renderExs();
}

function addSerie(k){
  if(!exSeries[k]) exSeries[k]=[];
  exSeries[k].push({peso:'',reps:'',obs:''});
  sv('exSeries_'+selectedDateKey,exSeries);
  renderTbody(k);
}

function delSerie(k,i){
  if((exSeries[k]||[]).length<=1) return;
  exSeries[k].splice(i,1);
  sv('exSeries_'+selectedDateKey,exSeries);
  renderTbody(k);
}

function saveSeries(k){
  const obs=document.getElementById('obs-'+k)?.value||'';
  const cur=exSeries[k]||[];
  exSeries[k]=cur.map((_,i)=>({
    peso:document.getElementById('p-'+k+'-'+i)?.value||'',
    reps:document.getElementById('r-'+k+'-'+i)?.value||'',
    obs:i===0?obs:''
  })).filter(s=>s.reps||s.peso);
  sv('exSeries_'+selectedDateKey,exSeries);
  openPanel=null; renderExs();
}

function toggleEx(k){
  exChecked[k]=!exChecked[k]; sv('exChecked_'+selectedDateKey,exChecked); renderExs();
}

function finalizarTreino(){
  const t=TREINOS[activeTreino];
  const exercicios=t.exs.map((e,i)=>{
    const k=activeTreino+'_'+i;
    return {name:e.name,feito:!!exChecked[k],series:exSeries[k]||[]};
  }).filter(e=>e.feito||e.series.length>0);
  if(!exercicios.length){alert('Registre pelo menos um exercício antes de finalizar!');return;}
  workoutHistory.unshift({
    id:Date.now(),date:selectedDateKey.replace(/-/g,'/'),selectedDateKey,
    treino:activeTreino,label:TREINOS[activeTreino].label,exercicios
  });
  sv('workoutHistory',workoutHistory);
  alert('Treino salvo! 💪');
}

function renderSessions(){
  const el=document.getElementById('session-list');
  let sessions=histFilter==='ALL'?workoutHistory:workoutHistory.filter(s=>s.treino===histFilter);
  if(!sessions.length){el.innerHTML='<p class="empty">Nenhum treino registrado ainda.</p>';return;}
  el.innerHTML=sessions.map(s=>`
    <div class="hsession">
      <div class="hsession-hdr">
        <span class="hsession-name">${s.label}</span>
        <span class="hsession-date">${s.date}</span>
      </div>
      ${s.exercicios.map(e=>{
        const chips=e.series.filter(sr=>sr.reps||sr.peso).map((sr,i)=>`<span class="hex-chip">S${i+1}: ${sr.peso?sr.peso+'kg':'—'}×${sr.reps||'—'}</span>`).join('');
        const obs=e.series[0]?.obs;
        return `<div class="hex">
          <div class="hex-name">${e.name}${e.feito&&!chips?' <span style="font-size:11px;color:var(--accent2);">✓</span>':''}</div>
          ${chips?`<div class="hex-chips">${chips}</div>`:''}
          ${obs?`<div class="hex-obs">${obs}</div>`:''}
        </div>`;
      }).join('')}
    </div>`).join('');
}

function renderProgression(){
  const el=document.getElementById('prog-list');
  // Collect all exercises across history
  const exMap={};
  [...workoutHistory].reverse().forEach(s=>{
    s.exercicios.forEach(e=>{
      if(!e.series?.length) return;
      if(!exMap[e.name]) exMap[e.name]=[];
      const best=e.series.reduce((b,sr)=>parseFloat(sr.peso||0)>=parseFloat(b.peso||0)?sr:b,e.series[0]);
      if(best.peso||best.reps) exMap[e.name].push({date:s.date,peso:best.peso,reps:best.reps,vol:e.series.reduce((t,sr)=>t+(parseFloat(sr.peso||0)*parseFloat(sr.reps||0)),0).toFixed(0)});
    });
  });
  if(!Object.keys(exMap).length){el.innerHTML='<p class="empty">Treine para ver sua progressão aqui.</p>';return;}
  el.innerHTML=Object.entries(exMap).map(([name,records])=>{
    const rows=records.slice(-5).reverse().map((r,i)=>{
      const isBest=i===0;
      return `<div class="prog-row">
        <span class="prog-date">${r.date}</span>
        <span class="${isBest?'prog-best':'prog-val'}">${r.peso?r.peso+'kg':'—'} × ${r.reps||'—'} ${r.vol>0?`· vol ${r.vol}`:''}</span>
      </div>`;
    }).join('');
    return `<div class="prog-ex-card"><div class="prog-ex-name">${name}</div>${rows}</div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// ALIMENTAÇÃO
// ═══════════════════════════════════════════════════════════
function calcTotals(){
  let kcal=0,p=0,c=0,f=0;
  Object.values(foodLog).forEach(items=>items.forEach(it=>{kcal+=it.kcal;p+=it.p;c+=it.c;f+=it.f;}));
  return {kcal:Math.round(kcal),p:Math.round(p),c:Math.round(c),f:Math.round(f)};
}

function updateCalSummary(){
  const tot=calcTotals();
  document.getElementById('cal-consumed').textContent=tot.kcal;
  document.getElementById('cal-remaining').textContent=(CAL_META-tot.kcal)>0?(CAL_META-tot.kcal)+' restantes':'Meta atingida ✓';
  const arc=document.getElementById('cal-arc');
  const pct=Math.min(tot.kcal/CAL_META,1);
  arc.style.strokeDashoffset=239-(239*pct);
  arc.style.stroke=pct>=1?'#2dd4a0':'#f5a623';
  document.getElementById('prot-val').textContent=`${tot.p}/${MACRO_META.p}g`;
  document.getElementById('carb-val').textContent=`${tot.c}/${MACRO_META.c}g`;
  document.getElementById('fat-val').textContent=`${tot.f}/${MACRO_META.f}g`;
  document.getElementById('prot-bar').style.width=Math.min(tot.p/MACRO_META.p*100,100)+'%';
  document.getElementById('carb-bar').style.width=Math.min(tot.c/MACRO_META.c*100,100)+'%';
  document.getElementById('fat-bar').style.width=Math.min(tot.f/MACRO_META.f*100,100)+'%';
}

function renderMealSections(){
  document.getElementById('meal-sections').innerHTML=MEAL_NAMES.map(mname=>{
    const items=foodLog[mname]||[];
    const mkcal=Math.round(items.reduce((t,i)=>t+i.kcal,0));
    const itemsHtml=items.map((it,idx)=>`
      <div class="food-item-row">
        <span class="food-item-name">${it.name}</span>
        <span class="food-item-qty">${it.qty}g</span>
        <span class="food-item-kcal">${Math.round(it.kcal)}kcal</span>
        <button class="food-del-btn" onclick="removeFood('${mname}',${idx})">×</button>
      </div>`).join('');
    return `<div class="meal-section">
      <div class="meal-section-hdr" onclick="toggleMealSection(this)">
        <span class="meal-section-name">${mname}</span>
        <div class="meal-section-meta">
          ${mkcal?`<span class="meal-kcal">${mkcal} kcal</span>`:''}
          <button class="meal-add-btn" onclick="event.stopPropagation();openFoodModal('${mname}')">+</button>
        </div>
      </div>
      <div class="meal-items${items.length?' open':''}">
        ${itemsHtml||'<div style="font-size:12px;color:var(--text3);padding:6px 0;">Nenhum alimento adicionado</div>'}
      </div>
    </div>`;
  }).join('');
  updateCalSummary();
}

function toggleMealSection(hdr){
  hdr.nextElementSibling.classList.toggle('open');
}

function removeFood(mname,idx){
  if(!foodLog[mname]) return;
  foodLog[mname].splice(idx,1);
  sv('foodLog_'+selectedDateKey,foodLog);
  renderMealSections();
}

// ── MODAL ──
function openFoodModal(mname){
  modalMeal=mname; selectedFood=null;
  document.getElementById('modal-meal-name').textContent='Adicionar em: '+mname;
  document.getElementById('food-search').value='';
  document.getElementById('search-results').innerHTML='';
  document.getElementById('selected-food-wrap').style.display='none';
  document.getElementById('food-modal').classList.add('open');
  setTimeout(()=>document.getElementById('food-search').focus(),200);
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('food-modal')) return;
  document.getElementById('food-modal').classList.remove('open');
  modalMeal=null; selectedFood=null;
}

function searchFood(q){
  document.getElementById('selected-food-wrap').style.display='none';
  selectedFood=null;
  if(q.length<2){document.getElementById('search-results').innerHTML='';return;}
  const ql=q.toLowerCase();
  const results=FOOD_DB.filter(f=>f.name.toLowerCase().includes(ql)).slice(0,8);
  document.getElementById('search-results').innerHTML=results.length
    ?results.map(f=>`<div class="food-result" onclick="selectFood(${FOOD_DB.indexOf(f)})">
        <div><div class="food-result-name">${f.name}</div><div class="food-result-info">P:${f.p}g C:${f.c}g G:${f.f}g por 100g</div></div>
        <span class="food-result-kcal">${f.kcal} kcal</span>
      </div>`).join('')
    :'<p style="font-size:13px;color:var(--text3);padding:12px 0;">Alimento não encontrado</p>';
}

function selectFood(idx){
  selectedFood=FOOD_DB[idx];
  document.getElementById('sel-food-name').textContent=selectedFood.name;
  document.getElementById('sel-food-info').textContent=`Por 100g: ${selectedFood.kcal} kcal · P:${selectedFood.p}g C:${selectedFood.c}g G:${selectedFood.f}g`;
  document.getElementById('qty-inp').value=100;
  document.getElementById('selected-food-wrap').style.display='block';
  document.getElementById('search-results').innerHTML='';
  updateQtyPreview();
}

function updateQtyPreview(){
  if(!selectedFood) return;
  const qty=parseFloat(document.getElementById('qty-inp').value)||0;
  const f=qty/100;
  document.getElementById('qty-preview').textContent=
    `→ ${Math.round(selectedFood.kcal*f)} kcal · P:${Math.round(selectedFood.p*f)}g C:${Math.round(selectedFood.c*f)}g G:${Math.round(selectedFood.f*f)}g`;
}

function confirmAddFood(){
  if(!selectedFood||!modalMeal) return;
  const qty=parseFloat(document.getElementById('qty-inp').value)||0;
  if(qty<=0) return;
  const f=qty/100;
  if(!foodLog[modalMeal]) foodLog[modalMeal]=[];
  foodLog[modalMeal].push({
    name:selectedFood.name, qty,
    kcal:selectedFood.kcal*f, p:selectedFood.p*f,
    c:selectedFood.c*f, f:selectedFood.f*f
  });
  sv('foodLog_'+selectedDateKey,foodLog);
  document.getElementById('food-modal').classList.remove('open');
  renderMealSections();
}

// ═══════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════
function showScreen(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('sc-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='hist'){renderHistTabs();renderSessions();}
  if(id==='food') renderMealSections();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
initHeader();
renderSelector();
renderExs();
</script>
